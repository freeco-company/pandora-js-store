name: Setup nginx Vary header strip
on:
  workflow_dispatch:

# 一次性設定：在 prod nginx 加 Vary header 改寫（CF Free 方案 Vary 限制相容）。
# idempotent，重跑安全。

jobs:
  patch:
    name: Patch nginx config + reload
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Add server to known_hosts
        run: ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: SSH connect smoke test
        run: |
          ssh -o ServerAliveInterval=30 root@${{ secrets.SERVER_HOST }} 'echo connected; whoami; nginx -v 2>&1; ls /etc/nginx/'

      - name: Apply nginx Vary patch
        run: |
          ssh -o ServerAliveInterval=30 root@${{ secrets.SERVER_HOST }} bash -s <<'REMOTE'
          set -e

          TS=$(date +%s)
          BACKUP_DIR=/root/nginx-backups
          mkdir -p "$BACKUP_DIR"

          echo "=== Step 1: 找 Next.js proxy 設定檔（限 sites-enabled）==="
          # nginx 用 upstream 'pandora_next'，只看 sites-enabled 避開 .bak
          CANDIDATES=$(grep -lE 'proxy_pass[[:space:]]+http://pandora_next' /etc/nginx/sites-enabled/* 2>/dev/null || true)
          echo "候選:"
          echo "$CANDIDATES"
          CONFIG=$(echo "$CANDIDATES" | head -1)
          if [ -z "$CONFIG" ]; then
            echo "ERROR: sites-enabled 找不到 proxy_pass http://pandora_next；列出所有候選："
            ls -la /etc/nginx/sites-enabled/ 2>/dev/null || true
            grep -rE 'proxy_pass' /etc/nginx/sites-enabled/ 2>/dev/null || true
            exit 1
          fi
          echo "目標: $CONFIG"
          echo
          echo "對應 server_name:"
          grep -E 'server_name' "$CONFIG" || true
          echo
          echo "upstream 定義（驗證 port）:"
          grep -rA 3 'upstream pandora_next' /etc/nginx/ 2>/dev/null | grep -v -- "--$" | head -10 || true

          echo
          echo "=== Step 2: 備份 ==="
          BACKUP="$BACKUP_DIR/$(basename "$CONFIG").bak.$TS"
          cp "$CONFIG" "$BACKUP"
          echo "已備份到 $BACKUP"

          echo
          echo "=== Step 3: 寫 map 到 conf.d/ ==="
          cat > /etc/nginx/conf.d/00-vary-rsc.conf <<'NGINX'
          # CF Free 方案 Vary 只認 Accept-Encoding。Next.js 16 App Router 對所有
          # response 帶多值 Vary 會讓 CF DYNAMIC 拒快取。對非 RSC 請求簡化 Vary
          # 讓 CF 快取，RSC 請求保留多值 Vary 永遠回源拿正確 payload。
          map $http_rsc $vary_value {
              default "Accept-Encoding";
              "1"     "rsc, next-router-state-tree, next-router-prefetch, next-router-segment-prefetch, Accept-Encoding";
          }
          NGINX
          echo "已寫 /etc/nginx/conf.d/00-vary-rsc.conf"
          cat /etc/nginx/conf.d/00-vary-rsc.conf

          echo
          echo "=== Step 4: Patch Next.js location ==="
          if grep -q 'vary_value' "$CONFIG"; then
            echo "已含 vary_value，skip sed"
          else
            sed -i -E "/proxy_pass[[:space:]]+http:\\/\\/pandora_next;/a\\
            proxy_hide_header Vary;\\
            add_header Vary \$vary_value always;" "$CONFIG"
            echo "已 patch $CONFIG，diff:"
            diff "$BACKUP" "$CONFIG" || true
          fi

          echo
          echo "=== Step 5: nginx -t ==="
          if ! nginx -t 2>&1; then
            echo "ERROR: nginx -t failed，rollback"
            cp "$BACKUP" "$CONFIG"
            rm -f /etc/nginx/conf.d/00-vary-rsc.conf
            nginx -t
            exit 1
          fi

          echo
          echo "=== Step 6: Reload ==="
          systemctl reload nginx
          echo "reloaded"

          echo
          echo "=== Step 7: 驗證 origin（繞 CF）==="
          sleep 2
          echo "-- 一般請求 --"
          curl -sI -H "Host: pandora.js-store.com.tw" http://127.0.0.1/ | grep -iE '^(vary|content-type|strict-transport):' | tr -d '\r' || true
          echo "-- RSC 請求 --"
          curl -sI -H "Host: pandora.js-store.com.tw" -H "rsc: 1" http://127.0.0.1/ | grep -iE '^(vary|content-type):' | tr -d '\r' || true
          REMOTE

      - name: Verify CF edge cache (公開)
        run: |
          echo "等 CF 5 秒..."
          sleep 5
          for i in 1 2 3; do
            echo "=== Try $i ==="
            curl -sI "https://pandora.js-store.com.tw/" | grep -iE '^(vary|cf-cache-status|age):' | tr -d '\r'
            echo
            sleep 2
          done

          echo "=== RSC（應 DYNAMIC）==="
          curl -sI -H "rsc: 1" "https://pandora.js-store.com.tw/" | grep -iE '^(vary|cf-cache-status):' | tr -d '\r'
