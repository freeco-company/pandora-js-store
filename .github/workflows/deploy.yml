name: Deploy

on:
  push:
    branches: [main]           # auto-deploy on merge to main
  workflow_dispatch:            # allow manual trigger from GitHub UI

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false    # never cancel a deploy mid-flight

jobs:
  notify-start:
    name: Discord — deploy started
    runs-on: ubuntu-latest
    steps:
      - name: Post start notification
        env:
          COMMIT_SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          BRANCH: ${{ github.ref_name }}
          MESSAGE: ${{ github.event.head_commit.message }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          TIMESTAMP: ${{ github.event.head_commit.timestamp }}
          WEBHOOK: ${{ secrets.DISCORD_DEPLOY_WEBHOOK }}
        run: |
          PAYLOAD=$(jq -n \
            --arg title   "🚀 Deploy started" \
            --arg sha     "$COMMIT_SHA" \
            --arg actor   "$ACTOR" \
            --arg branch  "$BRANCH" \
            --arg msg     "$MESSAGE" \
            --arg run     "$RUN_URL" \
            --arg ts      "$TIMESTAMP" \
            '{
              embeds: [{
                title: $title,
                description: ("**commit**: `" + $sha[0:7] + "`\n**by**: " + $actor + "\n**branch**: `" + $branch + "`\n**message**: " + ($msg | split("\n")[0]) + "\n**run**: <" + $run + ">"),
                color: 3447003,
                timestamp: $ts
              }]
            }')
          curl -fsSL -H "Content-Type: application/json" -d "$PAYLOAD" "$WEBHOOK" || true

  deploy:
    name: Build + rsync + zero-downtime reload
    # No more `needs: test` — the standalone CI workflow already runs
    # on push and gates quality. Re-running it here was doubling the
    # pipeline (frontend built 3 times!). The smoke test at the end
    # catches anything that slips through.
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.smoke.outputs.status }}
    steps:
      - uses: actions/checkout@v4

      # Backend tests run in the standalone CI workflow (parallel on
      # push). No need to duplicate here — the smoke test at the end
      # catches runtime regressions.

      # ── Frontend pre-build in CI (7GB RAM, no OOM risk) ──────────
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: cd frontend && npm ci --no-audit --no-fund

      - name: Build Next.js (CI, not server)
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_STORAGE_URL: ${{ secrets.NEXT_PUBLIC_STORAGE_URL }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_GTM_ID: ${{ secrets.NEXT_PUBLIC_GTM_ID }}
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
          NEXT_PUBLIC_APP_VERSION: ${{ github.sha }}
        run: |
          cd frontend
          NODE_OPTIONS='--max-old-space-size=4096' npm run build 2>&1 | tail -10

      # ── SSH setup ────────────────────────────────────────────────
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Add server to known_hosts
        run: ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      # ── Rsync backend source ─────────────────────────────────────
      - name: Rsync backend
        run: |
          rsync -az \
            --exclude='node_modules/' --exclude='.next/' --exclude='.git/' \
            --exclude='vendor/' --exclude='storage/logs/' \
            --exclude='storage/framework/cache/' \
            --exclude='storage/framework/sessions/' \
            --exclude='storage/framework/views/' \
            --exclude='bootstrap/cache/*.php' \
            --exclude='.env*' \
            backend/ root@${{ secrets.SERVER_HOST }}:/var/www/pandora/backend/

      # ── Rsync frontend source + pre-built .next ──────────────────
      - name: Rsync frontend (source + .next build output)
        # --delete: remove files on server that are no longer in repo.
        # Critical to prevent stale public/ and .next/ chunks shadowing
        # current code (e.g. a pre-launch public/robots.txt that lingered
        # after being removed from repo kept serving the old pandora-dev
        # sitemap URL for weeks). Excludes protect server-only state:
        # node_modules (installed on server), .env* (prod secrets), .git/.
        run: |
          rsync -az --delete \
            --exclude='node_modules/' --exclude='.git/' \
            --exclude='.env*' \
            frontend/ root@${{ secrets.SERVER_HOST }}:/var/www/pandora/frontend/

      - name: Rsync scripts + workflows
        run: |
          rsync -az scripts/ root@${{ secrets.SERVER_HOST }}:/var/www/pandora/scripts/ || true

      # ── Sync runtime secrets into prod .env ──────────────────────
      # .env* is excluded from rsync (to protect prod secrets), but that
      # also means new secrets added in GH never reach the server. This
      # step upserts runtime secrets into prod .env so Laravel/Next can
      # read them. Must run BEFORE `config:cache` snapshots config.
      - name: Sync runtime secrets to prod .env
        env:
          REVALIDATE_SECRET: ${{ secrets.REVALIDATE_SECRET }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          ssh -o ServerAliveInterval=30 root@${{ secrets.SERVER_HOST }} \
            "REVALIDATE_SECRET='$REVALIDATE_SECRET' \
             CLOUDFLARE_ZONE_ID='$CLOUDFLARE_ZONE_ID' \
             CLOUDFLARE_API_TOKEN='$CLOUDFLARE_API_TOKEN' \
             bash -s" <<'EOF'
            set -e
            BE=/var/www/pandora/backend/.env
            FE=/var/www/pandora/frontend/.env.production

            upsert() {
              local file=$1 key=$2 val=$3
              if grep -q "^${key}=" "$file"; then
                # Use # as sed delimiter — our values are hex / tokens,
                # never contain #.
                sed -i "s#^${key}=.*#${key}=${val}#" "$file"
              else
                printf '\n%s=%s\n' "$key" "$val" >> "$file"
              fi
            }

            upsert "$BE" REVALIDATE_SECRET    "$REVALIDATE_SECRET"
            upsert "$BE" CLOUDFLARE_ZONE_ID   "$CLOUDFLARE_ZONE_ID"
            upsert "$BE" CLOUDFLARE_API_TOKEN "$CLOUDFLARE_API_TOKEN"
            upsert "$FE" REVALIDATE_SECRET    "$REVALIDATE_SECRET"
          EOF

      # ── Backend install + migrate + cache ────────────────────────
      - name: Backend install + migrate + cache
        run: |
          ssh -o ServerAliveInterval=30 -o ServerAliveCountMax=120 root@${{ secrets.SERVER_HOST }} bash -s <<'EOF'
            set -e
            cd /var/www/pandora/backend
            composer install --no-dev --optimize-autoloader --no-interaction 2>&1 | tail -3
            rm -f bootstrap/cache/*.php
            php artisan filament:assets 2>&1 | tail -2
            php artisan storage:link || true
            php artisan view:clear
            php artisan config:cache
            php artisan route:cache
            php artisan migrate --force

            # Storage permissions: rsync from CI carries the runner's UID
            # (1001) into storage/, but php-fpm runs as www-data — every
            # admin upload via Filament/Livewire would fail with
            # UnableToCreateDirectory until we re-chown after rsync.
            # Also pre-create runtime dirs Livewire/Filament needs.
            mkdir -p storage/app/public/livewire-tmp \
                     storage/framework/cache \
                     storage/framework/sessions \
                     storage/framework/views
            chown -R www-data:www-data storage bootstrap/cache
            chmod -R 775 storage bootstrap/cache
          EOF

      # ── Frontend: just npm install + pm2 reload (no build!) ──────
      - name: Frontend install + graceful reload
        run: |
          ssh -o ServerAliveInterval=30 -o ServerAliveCountMax=120 root@${{ secrets.SERVER_HOST }} bash -s <<'EOF'
            set -e
            cd /var/www/pandora/frontend
            # .next/ was already rsynced from CI pre-build — no npm run build needed!
            # next.config.ts conditionally requires @next/bundle-analyzer only
            # when ANALYZE=true, so --omit=dev is safe here (saves ~300 pkgs).
            npm install --omit=dev --prefer-offline --no-audit --no-fund 2>&1 | tail -3
            # Graceful reload: new workers start, old ones drain — zero downtime
            pm2 reload pandora-frontend || pm2 restart pandora-frontend
            : > /root/.pm2/logs/pandora-frontend-error-0.log
          EOF

      - name: Wait for frontend warm up
        run: sleep 5

      - name: Smoke test (live)
        id: smoke
        env:
          DEPLOY_CONFIRMED: '1'
          TEST_URL: 'https://pandora.js-store.com.tw'
        run: |
          if bash scripts/smoke.sh; then
            echo "status=pass" >> $GITHUB_OUTPUT
          else
            echo "status=fail" >> $GITHUB_OUTPUT
            exit 1
          fi

      # Precision Cloudflare purge — clear HTML/sitemap so visitors never
      # see a mid-deploy mixed response. /_next/static/* is hashed so it's
      # safe to leave cached; /storage/* doesn't change on deploy.
      - name: Purge Cloudflare cache (HTML + sitemap)
        if: success()
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ZONE:  ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: |
          curl -sS -X POST \
            "https://api.cloudflare.com/client/v4/zones/${CF_ZONE}/purge_cache" \
            -H "Authorization: Bearer ${CF_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{
              "files": [
                "https://pandora.js-store.com.tw/",
                "https://pandora.js-store.com.tw/products",
                "https://pandora.js-store.com.tw/articles",
                "https://pandora.js-store.com.tw/reviews",
                "https://pandora.js-store.com.tw/where-to-buy",
                "https://pandora.js-store.com.tw/sitemap.xml",
                "https://pandora.js-store.com.tw/sitemap-images.xml",
                "https://pandora.js-store.com.tw/robots.txt",
                "https://pandora.js-store.com.tw/manifest.webmanifest"
              ]
            }' | tee /tmp/cf-purge.json
          grep -q '"success":true' /tmp/cf-purge.json || { echo "Cloudflare purge failed"; exit 1; }

  notify:
    name: Discord notification
    needs: [deploy]
    if: always()                # always run, even if prior jobs failed
    runs-on: ubuntu-latest
    steps:
      - name: Determine status
        id: status
        run: |
          if [[ "${{ needs.deploy.result }}" == "success" ]]; then
            echo "color=4915280" >> $GITHUB_OUTPUT          # green 0x4A9D5F
            echo "emoji=✅" >> $GITHUB_OUTPUT
            echo "title=Deploy OK" >> $GITHUB_OUTPUT
          elif [[ "${{ needs.deploy.result }}" == "failure" ]]; then
            echo "color=14709644" >> $GITHUB_OUTPUT         # red 0xE0748C
            echo "emoji=❌" >> $GITHUB_OUTPUT
            echo "title=Deploy failed" >> $GITHUB_OUTPUT
          else
            echo "color=15243067" >> $GITHUB_OUTPUT         # orange 0xE8A93B
            echo "emoji=⚠️" >> $GITHUB_OUTPUT
            echo "title=Deploy failed" >> $GITHUB_OUTPUT
          fi

      - name: Post to Discord
        env:
          EMOJI: ${{ steps.status.outputs.emoji }}
          TITLE: ${{ steps.status.outputs.title }}
          COLOR: ${{ steps.status.outputs.color }}
          COMMIT_SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          BRANCH: ${{ github.ref_name }}
          MESSAGE: ${{ github.event.head_commit.message }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          TIMESTAMP: ${{ github.event.head_commit.timestamp }}
          WEBHOOK: ${{ secrets.DISCORD_DEPLOY_WEBHOOK }}
        run: |
          # Build JSON safely with jq so Chinese/newlines/backticks in the commit
          # message can't break the shell or the webhook payload.
          PAYLOAD=$(jq -n \
            --arg title   "$EMOJI $TITLE" \
            --arg sha     "$COMMIT_SHA" \
            --arg actor   "$ACTOR" \
            --arg branch  "$BRANCH" \
            --arg msg     "$MESSAGE" \
            --arg run     "$RUN_URL" \
            --arg ts      "$TIMESTAMP" \
            --argjson color  "$COLOR" \
            '{
              embeds: [{
                title: $title,
                description: ("**commit**: `" + $sha[0:7] + "`\n**by**: " + $actor + "\n**branch**: `" + $branch + "`\n**message**: " + ($msg | split("\n")[0]) + "\n**run**: <" + $run + ">"),
                color: $color,
                timestamp: $ts
              }]
            }')
          curl -fsSL -H "Content-Type: application/json" -d "$PAYLOAD" "$WEBHOOK" || true
